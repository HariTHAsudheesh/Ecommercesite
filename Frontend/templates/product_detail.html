<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ product.name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">
  <div class="row align-items-center">

    <!-- Product Image -->
    <div class="col-md-6 text-center">
      <img src="{{ product.image.url }}" class="img-fluid rounded shadow" alt="{{ product.name }}">
    </div>

    <!-- Product Details -->
    <div class="col-md-6">
      <h2 class="mb-3">{{ product.name }}</h2>
      <h4 class="text-success mb-3">₹ {{ product.price }}</h4>

      <p class="text-muted">
        This is a high-quality product. You can add a description field later
        in your Product model if needed.
      </p>

      <div class="mt-4">
        <a href="{% url 'add_to_cart' product.id %}" class="btn btn-success btn-lg me-2">
          Add to Cart
        </a>

        <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-lg">
          Back to Shop
        </a>
      </div>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
